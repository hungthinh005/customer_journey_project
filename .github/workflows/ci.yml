name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Job 1: Code Quality (Linting & Formatting)
  # ============================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

  # ============================================================
  # Job 2: Unit Tests
  # ============================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ============================================================
  # Job 3: Docker Build & Push
  # ============================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t churn-prevention-system:${{ github.sha }} .
          docker build -t churn-prevention-system:latest .

      - name: Test Docker image
        run: |
          docker run -d --name test-api -p 8000:8000 churn-prevention-system:latest
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api

      # Uncomment below to push to Docker Hub or GitHub Container Registry
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      #
      # - name: Push image
      #   run: |
      #     docker tag churn-prevention-system:latest ${{ secrets.DOCKER_USERNAME }}/churn-prevention-system:latest
      #     docker push ${{ secrets.DOCKER_USERNAME }}/churn-prevention-system:latest

  # ============================================================
  # Job 4: Model Pipeline (Optional - triggered manually)
  # ============================================================
  train:
    name: Training Pipeline
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: cjp
          POSTGRES_PASSWORD: cjp_password
          POSTGRES_DB: cjp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cjp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg2://cjp:cjp_password@localhost:5432/cjp
      AGENT_DRY_RUN: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download dataset
        run: python download_data.py
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

      - name: Run feature engineering
        run: python features/feature_engineering.py

      - name: Train churn models
        run: |
          python models/churn/train_bgnbd.py
          python models/churn/train_survival.py
          python models/churn/compare_churn.py

      - name: Train retrieval models
        run: |
          python models/retrieval/train_als.py
          python models/retrieval/train_item2vec.py
          python models/retrieval/train_two_tower.py
          python models/retrieval/compare_retrieval.py

      - name: Build FAISS index
        run: python faiss_index/build_index.py

      - name: Train ranking model
        run: python models/ranking/train_ranking.py

      - name: Run evaluation
        run: |
          python evaluation/evaluate_churn.py
          python evaluation/evaluate_rec.py
          python evaluation/ablation_study.py

      - name: Load serving store + segment customers
        run: |
          python db/load_to_db.py
          python segmentation/segment_users.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/
            faiss_index/
            evaluation/
